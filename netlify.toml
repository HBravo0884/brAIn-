[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."claude"]
  timeout = 26

[functions."notebook"]
  timeout = 26

[functions."gmail-sync"]
  timeout = 26

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Gmail scheduled scans
[functions."gmail-sync-am"]
  schedule = "0 13 * * *"

[functions."gmail-sync-pm"]
  schedule = "0 19 * * *"
